<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Booking</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script defer src="booking.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white">
    <section class="max-w-4xl mx-auto bg-white/10 rounded-2xl p-8">
      <h2 class="text-3xl font-bold mb-4">Book a Professional Survey</h2>
      <form
        id="bookingForm"
        class="grid grid-cols-1 md:grid-cols-2 gap-6"
        onsubmit="return false;"
      >
        <!-- Survey Type -->
        <div class="md:col-span-2">
          <label class="block mb-2 font-medium">Survey Type</label>
          <select
            id="surveyType"
            class="w-full p-3 rounded bg-gray-100 text-gray-800 focus:outline-none"
            required
          >
            <option value="">Select a service</option>
            <option value="residential">Residential Water Survey</option>
            <option value="commercial">Commercial Water Survey</option>
            <option value="mining">Mining Survey</option>
            <option value="borehole">Borehole Drilling Consultation</option>
          </select>
        </div>
        <!-- Name -->
        <div>
          <label class="block mb-2 font-medium">Your Name</label>
          <input
            id="customerName"
            type="text"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
            required
          />
        </div>
        <!-- Email -->
        <div>
          <label class="block mb-2 font-medium">Email Address</label>
          <input
            id="customerEmail"
            type="email"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
            required
          />
        </div>
        <!-- Phone -->
        <div>
          <label class="block mb-2 font-medium">Phone Number</label>
          <input
            id="customerPhone"
            type="tel"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
            required
          />
        </div>
        <!-- Date -->
        <div>
          <label class="block mb-2 font-medium">Preferred Date</label>
          <input
            id="preferredDate"
            type="date"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
            required
          />
        </div>
        <!-- Quantity -->
        <div>
          <label class="block mb-2 font-medium">Number of Surveys</label>
          <input
            id="quantity"
            type="number"
            min="1"
            value="1"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
          />
        </div>
        <!-- Location -->
        <div class="md:col-span-2">
          <label class="block mb-2 font-medium">Project Location</label>
          <input
            id="projectLocation"
            type="text"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
            required
          />
        </div>
        <!-- Details -->
        <div class="md:col-span-2">
          <label class="block mb-2 font-medium"
            >Project Details (Optional)</label
          >
          <textarea
            id="projectDetails"
            class="w-full p-3 rounded bg-gray-50 text-gray-800 focus:outline-none"
          ></textarea>
        </div>
        <div id="dynamicOptions" class="md:col-span-2 hidden"></div>
      </form>
    </section>

    <script src="booking.js"></script>
  </body>
</html>
